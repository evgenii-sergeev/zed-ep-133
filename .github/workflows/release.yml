name: Publish to zed-industries/extensions

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: huacnlee/zed-extension-action@v1
        with:
          extension-name: ep-133-ko-ii
          # Your fork of zed-industries/extensions; a PR is opened from here to upstream.
          push-to: evgenii-sergeev/extensions
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
